<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Jobs - Elevate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Elevate.</a>
            <div id="auth-nav" class="auth-nav"></div>
        </nav>
    </header>

    <main>
        <div class="dashboard-grid">
            <aside class="sidebar">
                <a href="hr-dashboard.html">Overview</a>
                <a href="manage-jobs.html" class="active">Manage Jobs</a>
                <a href="post-job.html">Post a Job</a>
            </aside>
            
            <div class="dashboard-content fade-in">
                <h2 style="margin-bottom: 1.5rem;">Manage Posted Jobs</h2>
                
                <div class="job-grid" id="my-jobs">
                    <p>Loading...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = getUser();
            if (!user || user.role !== 'hr') {
                window.location.href = 'login.html';
                return;
            }

            try {
                const jobs = await apiFetch('/jobs/hr/my-jobs');
                const container = document.getElementById('my-jobs');
                container.innerHTML = '';

                if (jobs.length === 0) {
                    container.innerHTML = '<p>You have not posted any jobs yet.</p>';
                    return;
                }

                jobs.forEach(job => {
                    const card = document.createElement('div');
                    card.className = 'job-card';
                    card.innerHTML = `
                        <h3 class="job-title">${job.title}</h3>
                        <p class="job-company">${new Date(job.created_at).toLocaleDateString()}</p>
                        <div style="display: flex; gap: 0.5rem; margin-top: auto; padding-top: 1rem;">
                            <a href="applicants.html?jobId=${job.id}" class="btn btn-primary" style="flex: 1; text-align: center; padding: 0.4rem;">Applicants</a>
                            <button class="btn btn-outline" style="border-color: #ef4444; color: #ef4444; padding: 0.4rem;" onclick="deleteJob(${job.id})">Delete</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {}
        });

        async function deleteJob(id) {
            if (!confirm('Are you sure you want to delete this job?')) return;
            try {
                await apiFetch(`/jobs/${id}`, { method: 'DELETE' });
                showToast('Job deleted successfully');
                setTimeout(() => window.location.reload(), 1000);
            } catch (err) {}
        }
    </script>
</body>
</html>
