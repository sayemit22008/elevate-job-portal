<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Elevate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Elevate.</a>
            <div class="auth-nav">
                <a href="register.html" class="btn btn-outline">Sign Up Instead</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="glass-card auth-container fade-in">
            <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--gray); font-size: 0.9rem;">
                Don't have an account? <a href="register.html" style="color: var(--primary);">Register</a>
            </p>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        // Redirect if already logged in
        if (getToken()) {
            const user = getUser();
            window.location.href = user.role === 'hr' ? 'hr-dashboard.html' : 'dashboard.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showToast('Login successful!');
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    setTimeout(() => {
                        window.location.href = data.user.role === 'hr' ? 'hr-dashboard.html' : 'dashboard.html';
                    }, 1000);
                } else {
                    showToast(data.message || 'Login failed', 'error');
                }
            } catch (err) {
                showToast('Failed to connect to server', 'error');
            }
        });
    </script>
</body>
</html>
